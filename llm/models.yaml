schema_version: "1.0"
description: "live-connector の TypeScript 型、MCP ツール入出力、LOM グラフモデルの目録。実装変更時に更新する。"

source_files:
    build_scripts:
        - "VERSION"
        - "package.json"
        - "turbo.json"
        - "apps/extension/package.json"
        - "apps/extension/build.ts"
        - "apps/extension/package.ts"
        - "apps/extension/src/types/manifest.ts"
    runtime:
        - "apps/extension/src/extension.ts"
        - "apps/extension/src/deps.ts"
        - "apps/extension/src/version.ts"
        - "apps/extension/src/server/http.ts"
        - "apps/extension/src/server/mcp.ts"
    tools:
        - "apps/extension/src/tools/schema.ts"
        - "apps/extension/src/tools/overview.ts"
        - "apps/extension/src/tools/query.ts"
        - "apps/extension/src/tools/audio.ts"
        - "apps/extension/src/tools/arrangement.ts"
        - "apps/extension/src/tools/create.ts"
        - "apps/extension/src/tools/devices.ts"
        - "apps/extension/src/tools/presets.ts"
        - "apps/extension/src/tools/write.ts"
        - "apps/extension/src/tools/notes.ts"
    lom_adapter:
        - "apps/extension/src/lom/adapter.ts"
    packages:
        - "packages/cypher/src/ast.ts"
        - "packages/cypher/src/evaluator.ts"
        - "packages/cypher/src/parser.ts"
        - "packages/cypher/src/tokenizer.ts"
        - "packages/lom-schema/src/types.ts"
        - "packages/lom-schema/src/schema.ts"
        - "packages/env/src/index.ts"
        - "packages/error/src/index.ts"
        - "packages/log/src/index.ts"

enums:
    property_type:
        source: "packages/lom-schema/src/types.ts"
        values:
            - "number"
            - "string"
            - "boolean"
            - "number[]"
            - "string[]"
            - "enum"
    property_access:
        source: "packages/lom-schema/src/types.ts"
        values:
            - "r"
            - "rw"
    comparison_operator:
        source: "packages/cypher/src/ast.ts"
        values:
            - "="
            - "<>"
            - "<"
            - ">"
            - "<="
            - ">="
            - "CONTAINS"
            - "STARTS_WITH"
            - "IN"
    token_type:
        source: "packages/cypher/src/tokenizer.ts"
        values:
            - "keyword"
            - "identifier"
            - "number"
            - "string"
            - "boolean"
            - "null"
            - "punct"
    log_level:
        source: "packages/log/src/index.ts"
        values:
            - "debug"
            - "info"
            - "warn"
            - "error"
    warp_mode:
        source: "packages/lom-schema/src/schema.ts"
        values:
            - "Beats"
            - "Tones"
            - "Texture"
            - "Repitch"
            - "Complex"
            - "ComplexPro"
    grid_quantization:
        source: "packages/lom-schema/src/schema.ts"
        values:
            - "NoGrid"
            - "EightBars"
            - "FourBars"
            - "TwoBars"
            - "Bar"
            - "Half"
            - "Quarter"
            - "Eighth"
            - "Sixteenth"
            - "ThirtySecond"

models:
    - name: "ExtensionManifest"
      kind: "manifest"
      source: "apps/extension/src/types/manifest.ts"
      owner_package: "@live-connector/extension"
      fields:
          - name: "name"
            type: "string"
            required: true
          - name: "author"
            type: "string"
            required: true
          - name: "version"
            type: "string"
            required: true
            value: "2.17.12"
            note: "バージョンの正本は VERSION。build.ts が manifest.json / package.json と一致を検証し、__LIVE_CONNECTOR_VERSION__ としてバンドルへ注入する。"
          - name: "entry"
            type: "string"
            required: true
          - name: "minimumApiVersion"
            type: "string"
            required: true

    - name: "ServiceVersion"
      kind: "version"
      source: "VERSION"
      note: "配布バージョンの正本。http.ts / mcp.ts は手書きリテラルを持たず version.ts の SERVICE_VERSION（build 注入）を参照する。"
      fields:
          - name: "value"
            type: "semver"
            required: true
            value: "2.17.12"

    - name: "Env"
      kind: "configuration"
      source: "packages/env/src/index.ts"
      owner_package: "@live-connector/env"
      fields:
          - name: "LIVE_CONNECTOR_MCP_HOST"
            type: "string"
            required: false
            default: "127.0.0.1"
            note: "loopback host のみ許可する。"
          - name: "LIVE_CONNECTOR_MCP_PORT"
            type: "number"
            required: false
            default: 7799

    - name: "ServerDeps"
      kind: "dependency_container"
      source: "apps/extension/src/deps.ts"
      owner_package: "@live-connector/extension"
      fields:
          - name: "context"
            type: "ExtensionContext<\"1.0.0\">"
            required: true
          - name: "log"
            type: "Logger"
            required: true

    - name: "ServerInfo"
      kind: "runtime_output"
      source: "apps/extension/src/server/http.ts"
      fields:
          - name: "host"
            type: "string"
            required: true
          - name: "port"
            type: "number"
            required: true
          - name: "mcpPath"
            type: "string"
            required: true
            value: "/api/v1/mcp"

    - name: "RegisteredToolsSummary"
      kind: "runtime_output"
      source: "apps/extension/src/server/mcp.ts"
      note: "describeRegisteredTools が createMcpServer と同一の register* 経路を辿って収集する。/health で公開する。"
      fields:
          - name: "count"
            type: "number"
            required: true
          - name: "digest"
            type: "string"
            required: true
            note: "ソート済みツール名の djb2 8 桁 hex ダイジェスト。"
          - name: "names"
            type: "string[]"
            required: true

    - name: "HealthResponse"
      kind: "http_response"
      source: "apps/extension/src/server/http.ts"
      content_type: "application/health+json"
      note: "認証なしエンドポイント。追加情報はバージョンとツール名の範囲に留める。"
      fields:
          - name: "status"
            type: "string"
            required: true
            value: "pass"
          - name: "version"
            type: "string"
            required: true
            value: "2.17.12"
          - name: "description"
            type: "string"
            required: true
            value: "live-connector MCP server"
          - name: "tools"
            type: "RegisteredToolsSummary"
            required: true
            note: "describeRegisteredTools(deps) の結果。稼働ホストのツール構成を外形確認する。"
          - name: "structure"
            type: "{ digest: string; songHandle: string } | null"
            required: true
            note: "接続先 Set の構造ダイジェストと songHandle。songHandle は SDK Handle.id（bigint、JSON.stringify 不可）を String 化した値。認証なしのため非 PII のみ（storageDirectory は含めない）。読み取り失敗時は null。"

    - name: "HttpEndpoint"
      kind: "http_contract"
      source: "apps/extension/src/server/http.ts"
      entries:
          - method: "GET"
            path: "/health"
            auth: "none"
            response: "HealthResponse"
          - method: "POST"
            path: "/api/v1/mcp"
            auth: "loopback Host and Origin header validation"
            transport: "StreamableHTTPServerTransport"

    - name: "TextContent"
      kind: "mcp_content"
      source: "apps/extension/src/tools/write.ts"
      fields:
          - name: "type"
            type: "\"text\""
            required: true
          - name: "text"
            type: "string"
            required: true

    - name: "ToolResult"
      kind: "mcp_result"
      source: "apps/extension/src/tools/write.ts"
      fields:
          - name: "content"
            type: "TextContent[]"
            required: true
          - name: "isError"
            type: "boolean"
            required: false

    - name: "ProblemDetails"
      kind: "error_response"
      source: "packages/error/src/index.ts"
      owner_package: "@live-connector/error"
      standard: "RFC 9457"
      fields:
          - name: "type"
            type: "string"
            required: true
          - name: "title"
            type: "string"
            required: true
          - name: "status"
            type: "number"
            required: true
          - name: "detail"
            type: "string"
            required: false
          - name: "instance"
            type: "string"
            required: false

    - name: "McpErrorMetadata"
      kind: "mcp_error_metadata"
      source: "packages/error/src/index.ts"
      owner_package: "@live-connector/error"
      fields:
          - name: "hint"
            type: "string"
            required: false
          - name: "validProperties"
            type: "string[]"
            required: false
          - name: "validRelationships"
            type: "string[]"
            required: false
          - name: "validStartLabels"
            type: "string[]"
            required: false
          - name: "validDeviceNames"
            type: "string[]"
            required: false

    - name: "McpError"
      kind: "mcp_error_response"
      source: "packages/error/src/index.ts"
      owner_package: "@live-connector/error"
      fields:
          - name: "error"
            type: "string"
            required: true
          - name: "detail"
            type: "string"
            required: true
          - name: "hint"
            type: "string"
            required: false
          - name: "validProperties"
            type: "string[]"
            required: false
          - name: "validRelationships"
            type: "string[]"
            required: false
          - name: "validStartLabels"
            type: "string[]"
            required: false
          - name: "validDeviceNames"
            type: "string[]"
            required: false

    - name: "AppErrorArgs"
      kind: "error_input"
      source: "packages/error/src/index.ts"
      fields:
          - name: "type"
            type: "string"
            required: false
          - name: "title"
            type: "string"
            required: true
          - name: "status"
            type: "number"
            required: true
          - name: "detail"
            type: "string"
            required: false
          - name: "metadata"
            type: "McpErrorMetadata"
            required: false

    - name: "Logger"
      kind: "service_interface"
      source: "packages/log/src/index.ts"
      owner_package: "@live-connector/log"
      methods:
          - name: "debug"
            params: ["message: string", "fields?: LogFields"]
          - name: "info"
            params: ["message: string", "fields?: LogFields"]
          - name: "warn"
            params: ["message: string", "fields?: LogFields"]
          - name: "error"
            params: ["message: string", "fields?: LogFields"]

    - name: "LogFields"
      kind: "record"
      source: "packages/log/src/index.ts"
      type: "Record<string, unknown>"

    - name: "ScalarValue"
      kind: "cypher_value"
      source: "packages/cypher/src/ast.ts"
      type: "string | number | boolean | null"

    - name: "Token"
      kind: "cypher_token"
      source: "packages/cypher/src/tokenizer.ts"
      fields:
          - name: "type"
            type: "TokenType"
            required: true
          - name: "value"
            type: "string"
            required: true
          - name: "start"
            type: "number"
            required: true

    - name: "NodePattern"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "variable"
            type: "string | null"
            required: true
          - name: "label"
            type: "string | null"
            required: true
          - name: "properties"
            type: "Record<string, ScalarValue>"
            required: true

    - name: "RelationshipPattern"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "types"
            type: "string[]"
            required: true
          - name: "minHops"
            type: "number"
            required: true
            default: 1
          - name: "maxHops"
            type: "number"
            required: true
            default: 1

    - name: "PatternPart"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "start"
            type: "NodePattern"
            required: true
          - name: "chain"
            type: "{ relationship: RelationshipPattern; node: NodePattern }[]"
            required: true

    - name: "PropertyRef"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "variable"
            type: "string"
            required: true
          - name: "property"
            type: "string"
            required: true

    - name: "ComparisonExpr"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "kind"
            type: "\"comparison\""
            required: true
          - name: "left"
            type: "PropertyRef"
            required: true
          - name: "operator"
            type: "ComparisonOperator"
            required: true
          - name: "right"
            type: "ScalarValue | ScalarValue[]"
            required: true

    - name: "LogicalExpr"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "kind"
            type: "\"logical\""
            required: true
          - name: "operator"
            type: "\"AND\" | \"OR\""
            required: true
          - name: "left"
            type: "WhereExpr"
            required: true
          - name: "right"
            type: "WhereExpr"
            required: true

    - name: "NotExpr"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "kind"
            type: "\"not\""
            required: true
          - name: "expr"
            type: "WhereExpr"
            required: true

    - name: "WhereExpr"
      kind: "cypher_ast_union"
      source: "packages/cypher/src/ast.ts"
      variants:
          - "ComparisonExpr"
          - "LogicalExpr"
          - "NotExpr"

    - name: "ReturnItem"
      kind: "cypher_ast_union"
      source: "packages/cypher/src/ast.ts"
      variants:
          - "{ kind: \"all\" }"
          - "{ kind: \"variable\"; variable: string }"
          - "{ kind: \"property\"; variable: string; property: string }"
          - "AggregateItem"

    - name: "AggregateItem"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "kind"
            type: "\"aggregate\""
            required: true
          - name: "func"
            type: "\"count\" | \"min\" | \"max\" | \"avg\" | \"sum\""
            required: true
          - name: "arg"
            type: "AggregateArg"
            required: true
          - name: "alias"
            type: "string"
            required: true
            note: "RETURN 行キー・ORDER BY 参照に使う正規化表記（count(n) 等）。"

    - name: "AggregateArg"
      kind: "cypher_ast_union"
      source: "packages/cypher/src/ast.ts"
      variants:
          - "{ kind: \"star\" }"
          - "{ kind: \"variable\"; variable: string }"
          - "{ kind: \"property\"; variable: string; property: string }"

    - name: "OrderItem"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "key"
            type: "OrderKey (variable | property | AggregateItem)"
            required: true
          - name: "direction"
            type: "\"ASC\" | \"DESC\""
            required: true

    - name: "Query"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "pattern"
            type: "PatternPart"
            required: true
          - name: "where"
            type: "WhereExpr | null"
            required: true
          - name: "distinct"
            type: "boolean"
            required: true
          - name: "returns"
            type: "ReturnItem[]"
            required: true
          - name: "orderBy"
            type: "OrderItem[]"
            required: true
          - name: "skip"
            type: "number | null"
            required: true
          - name: "limit"
            type: "number | null"
            required: true

    - name: "Row"
      kind: "query_result"
      source: "packages/cypher/src/evaluator.ts"
      type: "Record<string, unknown>"

    - name: "GraphAdapter"
      kind: "service_interface"
      source: "packages/cypher/src/evaluator.ts"
      methods:
          - name: "seeds"
            params: ["label: string | null"]
            returns: "Promise<N[]>"
          - name: "expand"
            params: ["node: N", "relationshipTypes: string[]"]
            returns: "Promise<N[]>"
          - name: "labelOf"
            params: ["node: N"]
            returns: "string"
          - name: "matchesLabel"
            params: ["node: N", "label: string"]
            returns: "boolean"
          - name: "getProperty"
            params: ["node: N", "property: string"]
            returns: "Promise<ScalarValue>"
          - name: "serialize"
            params: ["node: N"]
            returns: "Promise<Record<string, unknown>>"
          - name: "identity"
            params: ["node: N"]
            returns: "unknown"

    - name: "PropertyDef"
      kind: "lom_schema_type"
      source: "packages/lom-schema/src/types.ts"
      fields:
          - name: "name"
            type: "string"
            required: true
          - name: "type"
            type: "PropertyType"
            required: true
          - name: "access"
            type: "PropertyAccess"
            required: true
          - name: "enumValues"
            type: "string[]"
            required: false
          - name: "description"
            type: "string"
            required: false

    - name: "NodeLabelDef"
      kind: "lom_schema_type"
      source: "packages/lom-schema/src/types.ts"
      fields:
          - name: "label"
            type: "string"
            required: true
          - name: "extends"
            type: "string"
            required: false
          - name: "abstract"
            type: "boolean"
            required: false
          - name: "properties"
            type: "PropertyDef[]"
            required: true
          - name: "description"
            type: "string"
            required: false

    - name: "RelationshipDef"
      kind: "lom_schema_type"
      source: "packages/lom-schema/src/types.ts"
      fields:
          - name: "type"
            type: "string"
            required: true
          - name: "from"
            type: "string"
            required: true
          - name: "to"
            type: "string"
            required: true
          - name: "array"
            type: "boolean"
            required: true
          - name: "description"
            type: "string"
            required: false

    - name: "QueryContract"
      kind: "lom_schema_type"
      source: "packages/lom-schema/src/types.ts"
      fields:
          - name: "grammar"
            type: "string"
            required: true
          - name: "start_labels"
            type: "string[]"
            required: true
          - name: "time_coordinates"
            type: "{ absolute: string; relative: string }"
            required: true
            note: "アレンジメント絶対拍とクリップ相対拍の 2 系統。write_notes は相対拍。"
          - name: "read"
            type: "{ tool: string; return_contract: string; allowed_returns: string[] }"
            required: true
          - name: "select"
            type: "{ tools: string[]; return_contract: string; valid_examples: string[]; invalid_examples: string[]; hint: string }"
            required: true

    - name: "LomSchema"
      kind: "lom_schema_type"
      source: "packages/lom-schema/src/types.ts"
      fields:
          - name: "version"
            type: "string"
            required: true
          - name: "nodes"
            type: "NodeLabelDef[]"
            required: true
          - name: "relationships"
            type: "RelationshipDef[]"
            required: true

    - name: "ObjectNode"
      kind: "adapter_internal_model"
      source: "apps/extension/src/lom/adapter.ts"
      fields:
          - name: "type"
            type: "\"object\""
            required: true
          - name: "label"
            type: "string"
            required: true
          - name: "value"
            type: "DataModelObject<\"1.0.0\">"
            required: true
          - name: "index"
            type: "number | null"
            required: true

    - name: "NoteNode"
      kind: "adapter_internal_model"
      source: "apps/extension/src/lom/adapter.ts"
      fields:
          - name: "type"
            type: "\"note\""
            required: true
          - name: "label"
            type: "\"Note\""
            required: true
          - name: "value"
            type: "NoteDescription"
            required: true
          - name: "index"
            type: "number"
            required: true

    - name: "LomNode"
      kind: "adapter_internal_union"
      source: "apps/extension/src/lom/adapter.ts"
      variants:
          - "ObjectNode"
          - "NoteNode"

mcp_tools:
    - name: "McpServerMetadata"
      kind: "mcp_metadata"
      source: "apps/extension/src/server/mcp.ts"
      note: "initialize 応答の instructions（推奨手順・時刻座標・ガードレール・ミキサー経路の要約）と、withToolAnnotations facade による tool annotations（read=readOnlyHint / delete_*=destructiveHint / set_*・apply_device_state・restore_snapshot=idempotentHint）。annotations の正本は apps/extension/src/server/annotations.ts の TOOL_ANNOTATIONS。"
      decisions:
          mixer_write: "volume/panning/send は HAS_MIXER→Parameter 経由で set_device_parameter に統一する（set_track へ直接プロパティ追加はしない）。理由: ミキサー値は min/max/quantized を持つ Parameter で set_device_parameter が一貫して扱えるため。"
          mcp_prompts: "本 release では MCP prompts を採用しない。定型ワークフローの配布は instructions で代替する。採用時は別 Issue に分割する。"

    - name: "schema"
      source: "apps/extension/src/tools/schema.ts"
      input: null
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  schema: "LomSchema"
                  query_contract: "QueryContract"
                  examples: "string[]"

    - name: "get_overview"
      source: "apps/extension/src/tools/overview.ts"
      input:
          includeClips:
              type: "boolean"
              required: false
              default: true
              note: "false で各トラックの arrangementClips 明細を省略（arrangementClipCount は残す）。"
          trackOffset:
              type: "number"
              required: false
              default: 0
              constraints: ["integer", "value >= 0"]
          trackLimit:
              type: "number"
              required: false
              constraints: ["integer", "positive"]
              note: "返すトラック最大数。既定は全件。"
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  identity: "SetIdentity { storageDirectory: string|null, songHandle: string, sdkNote: string }"
                  structureDigest: "string（構造フィンガープリント djb2 8 桁 hex）"
                  tempo: "number"
                  scale:
                      name: "string"
                      mode: "boolean"
                      rootNote: "number"
                  trackCount: "number"
                  returnTrackCount: "number"
                  sceneCount: "number"
                  cuePointCount: "number"
                  arrangementEndTime: "number"
                  trackOffset: "number"
                  tracksShown: "number"
                  includeClips: "boolean"
                  cuePoints:
                      type: "array"
                      item:
                          index: "number"
                          name: "string"
                          time: "number"
                  tracks:
                      type: "array"
                      item:
                          index: "number"
                          name: "string"
                          kind: "midi | audio | other"
                          mute: "boolean"
                          solo: "boolean"
                          arm: "boolean"
                          arrangementClipCount: "number"
                          arrangementClips:
                              type: "array"
                              item:
                                  index: "number"
                                  _label: "\"MidiClip\" | \"AudioClip\" | \"Clip\""
                                  name: "string"
                                  startTime: "number"
                                  endTime: "number"
                                  duration: "number"

    - name: "query"
      source: "apps/extension/src/tools/query.ts"
      note: "LIMIT 省略時は DEFAULT_ROW_LIMIT(=500) で切り詰め、truncated:true と絞り込み hint を返す。LIMIT 明示時は評価器適用済みで素通し（既存挙動不変）。"
      input:
          cypher:
              type: "string"
              required: true
              min_length: 1
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  count: "number"
                  rows: "Row[]"
                  truncated: "boolean"
                  hint:
                      optional: true
                      type: "string"

    - name: "get_write_history"
      source: "apps/extension/src/tools/history.ts"
      note: "withWriteHistory facade が status:ok の書き込みと batch の適用段階失敗（部分適用あり）を storageDirectory/history/write-history.jsonl へ JSONL 記録。result 要約は snapshotId / undoSnapshotId / snapshots・生成物識別（clip / track / device 等の index・name・kind）・batch ステップ内訳（tools 列）を保持。ホスト再起動をまたいで参照可。上限超過は末尾 MAX_HISTORY_ENTRIES(1000) へローテーション。履歴ファイルの ENOENT のみ空応答で、他の fs 障害はエラー。"
      input:
          limit:
              type: "number"
              required: false
              default: 50
              constraints: ["integer", "positive", "<= 500"]
          since:
              type: "string"
              required: false
              note: "ISO 時刻。以降（含む）に絞る。"
          until:
              type: "string"
              required: false
              note: "ISO 時刻。以前（含む）に絞る。"
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  count: "number"
                  total: "number"
                  truncated: "boolean"
                  entries: "HistoryEntry[] { at: string, tool: string, input: object, result: object }（新しい順）"

    - name: "batch"
      source: "apps/extension/src/tools/batch.ts"
      note: "set_* / write_notes ステップを 1 回で実行し undo 履歴上 1 ステップにまとめる。入力検証は単体ツールと同一の zod スキーマ（SET_TOOL_SET_SCHEMAS / noteSchema / planNoteWrite）。解決・検証段階の失敗では何も適用しない。適用段階の失敗では SDK トランザクションがロールバックしないため適用済みステップが残り、応答で識別し書き込み履歴にも記録する。同一クリップへの複数 write_notes ステップは適用時に逐次再解決され先行結果を保持する。SDK のトランザクションコールバックが同期必須のため、後続ステップは同一 batch 内の先行ステップ生成物を参照不可、構造操作は対象外。"
      input:
          steps:
              type: "Step[]（discriminated union on tool）"
              required: true
              note: "set_song{set} / set_track|set_clip|set_scene|set_cue_point|set_device_parameter{select,set} / write_notes{select,notes,mode,range?,allowOutOfRange?}。set の per-property 検証と write_notes の検証は単体ツールと同一。"
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false
              note: "totalTargets > 20 で必須。"
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"preview\" | \"confirm_required\" | \"failed\" | \"ok\""
                  phase: "\"resolve\" | \"apply\"（failed のみ。resolve=未適用、apply=部分適用の可能性）"
                  snapshots: "{index,tool,snapshotId}[]（ok / failed(apply)。各ステップの適用前スナップショット）"
                  stepCount: "number（preview）"
                  appliedSteps: "number（ok）| []（failed/resolve）| {index,tool}[]（failed/apply。適用済みで Set に残る）"
                  failedSteps: "{index,tool,reason}[]（failed/apply）"
                  unappliedSteps: "{index,tool}[]（failed/apply。同期失敗以降の未開始ステップ）"
                  totalTargets: "number"
                  failedStep: "number（failed/resolve）"
                  steps: "step summary[]"

    - name: "snapshot_tools"
      source: "apps/extension/src/tools/snapshots.ts"
      note: "set_* / write_notes / transform_notes は適用直前に旧値を storageDirectory/snapshots/<id>.json へスナップショットし、応答に snapshotId を返す。batch は各ステップの適用直前に取得し、応答の snapshots[{index,tool,snapshotId}] で返す（同一対象への多段ステップでは先頭ステップの snapshotId が batch 実行前の状態）。保持は最新 MAX_SNAPSHOTS(100) 件でローテーション。SDK に undo API が無いための代替。"
      tools:
          restore_snapshot:
              input: "snapshotId: string"
              output: "status:ok + restored / matchedNow / snapshotTargets / missingFromSet / unmatchedNow / undoSnapshotId / note?（部分復元時）"
              note: "select を再解決し、対象を identity（Handle.id、schemaVersion 1.1 の targetIdentities）で照合して旧プロパティ値 / 旧 notes を書き戻す。requiredLabel を復元時にも検証。identity 不可の環境では件数一致時のみ index 照合（不一致は拒否＝順ズレ適用防止）。対象が全て消えた場合・破損ファイル・schemaVersion 不一致は hint 付きエラー。復元前の現在値を自動スナップショット（tool:restore_snapshot）し undoSnapshotId で返す。構造操作・非可逆属性は対象外。"
          list_snapshots:
              input: "limit?: number(<=100, 既定 50)"
              output: "count / total / truncated / snapshots[{ id, at, tool, kind, select }]"

    - name: "render_audio"
      source: "apps/extension/src/tools/audio.ts"
      note: "既定は同期で filePath を返す。background:true で jobId を即時返し、get_render_job で照会する（長尺のクライアントタイムアウト回避）。ジョブは module singleton の Map に MAX_RENDER_JOBS(50) 件保持。保持数超過の evict は done / error のみ（running は照会可能性を保つため保持）。running が上限を占有している場合、新規 background 開始は hint 付き BadRequestError で拒否する。"
      input:
          select:
              type: "string"
              required: true
              contract: "AudioTrack を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          startTime:
              type: "number"
              required: true
              constraints: ["value >= 0"]
          endTime:
              type: "number"
              required: true
              constraints: ["positive", "endTime > startTime"]
          background:
              type: "boolean"
              required: false
              note: "true で { status:started, jobId } を即時返す。"
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"ok\" | \"started\""
                  filePath: "string（ok）"
                  jobId: "string（started）"
                  startTime: "number"
                  endTime: "number"
                  duration: "number"
                  track:
                      index: "number"
                      name: "string"
                      kind: "\"audio\""

    - name: "get_render_job"
      source: "apps/extension/src/tools/audio.ts"
      input:
          jobId:
              type: "string"
              required: true
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  jobId: "string"
                  status: "\"running\" | \"done\" | \"error\""
                  filePath: "string（done）"
                  error: "string（error）"
                  track: "{ index, name, kind }"
                  startTime: "number"
                  endTime: "number"
                  duration: "number"

    - name: "search_presets"
      source: "apps/extension/src/tools/presets.ts"
      input:
          roots:
