    - name: "set_clip"
      source: "apps/extension/src/tools/write.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "Clip を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          set:
              name:
                  type: "string"
                  required: false
              color:
                  type: "number"
                  required: false
              muted:
                  type: "boolean"
                  required: false
              looping:
                  type: "boolean"
                  required: false
              warping:
                  type: "boolean"
                  required: false
              warpMode:
                  type: "warp_mode"
                  required: false
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false

    - name: "set_scene"
      source: "apps/extension/src/tools/write.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "Scene を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          set:
              name:
                  type: "string"
                  required: false
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false

    - name: "set_cue_point"
      source: "apps/extension/src/tools/write.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "CuePoint を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          set:
              name:
                  type: "string"
                  required: false
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false

    - name: "set_device_parameter"
      source: "apps/extension/src/tools/write.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "Parameter を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          set:
              value:
                  type: "number"
                  required: true
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false

    - name: "save_device_state"
      source: "apps/extension/src/tools/presets.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "Device を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          stateName:
              type: "string"
              required: true
          overwrite:
              type: "boolean"
              required: false
          preview:
              type: "boolean"
              required: false
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"preview\" | \"ok\""
                  stateName: "string"
                  device:
                      name: "string"
                  parameterCount: "number"
                  filePath: "string"

    - name: "apply_device_state"
      source: "apps/extension/src/tools/presets.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "Device を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          stateName:
              type: "string"
              required: true
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"preview\" | \"confirm_required\" | \"ok\""
                  stateName: "string"
                  sourceDevice:
                      optional: true
                      type: "string"
                  targetDevice:
                      optional: true
                      type: "string"
                  matched:
                      optional: true
                      type: "number"
                  applied:
                      optional: true
                      type: "number"
                  changes:
                      optional: true
                      type: "DeviceParameterChange[]"
                  hint:
                      optional: true
                      type: "string"

    - name: "transform_notes"
      source: "apps/extension/src/tools/transform-notes.ts"
      note: "select で選んだ MidiClip の notes を決定的変換する。クリップ相対座標。startTime [0,クリップ長) 外・pitch 0..127 外はどちらも onOutOfRange に従う（error=変換全体を拒否が既定。write_notes の境界検証と同じ方針）。quantize は末尾を超えないよう範囲内の直前グリッドへ丸め、ノートを削除しない。"
      input:
          select:
              type: "string"
              required: true
              contract: "MidiClip を単一ノード変数で RETURN する Cypher。"
          transform:
              type: "TransformSpec"
              required: true
              note: "transpose{semitones} / time_shift{delta} / velocity{scale?,offset?} / quantize{grid,strength?} / duplicate{offset,count?}。"
          filter:
              type: "NoteFilter"
              required: false
              note: "timeStart / timeEnd / pitchMin / pitchMax。対象ノートの絞り込み。"
          onOutOfRange:
              type: "\"drop\" | \"error\""
              required: false
              default: "error"
              note: "error=範囲外ノートが出る変換を拒否（既定）/ drop=範囲外ノートを削除（明示 opt-in）。"
          preview:
              type: "boolean"
              required: false
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"preview\" | \"ok\""
                  transform: "string"
                  clipLength: "number"
                  affected: "number"
                  droppedPitch: "number"
                  droppedTime: "number"
                  before: "{ noteCount, pitchRange, timeRange }"
                  after: "{ noteCount, pitchRange, timeRange }"
                  snapshotId: "string（ok のみ。適用前 notes のスナップショット。restore_snapshot で巻き戻す）"

    - name: "write_notes"
      source: "apps/extension/src/tools/notes.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "MidiClip を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          notes:
              type: "NoteInput[]"
              required: false
              default: "[]"
              note: "replace / merge の対象ノート（1 件以上必須。空・省略は hint 付き BadRequestError で全消去を防ぐ）。clear_range では無視する。startTime + duration がクリップ末尾を超えるノートは受理し、応答の tailOverflow に件数を返す。"
          mode:
              type: "\"replace\" | \"merge\" | \"clear_range\""
              required: false
              default: "replace"
              note: "replace=全置換 / merge=既存保持し追加（同一 pitch+startTime は入力で置換）/ clear_range=range のノート削除。全削除は clear_range を使う。"
          range:
              type: "{ start: number; end: number }"
              required: false
              note: "clear_range で削除するクリップ相対拍範囲 [start, end)。clear_range では必須。end <= start は hint 付きエラー。範囲全体がクリップ相対範囲 [0, クリップ長) の外にある場合は座標系の説明付きで拒否。"
          allowOutOfRange:
              type: "boolean"
              required: false
              default: false
              note: "クリップ相対拍 [0, クリップ長) を超える startTime を許容する。既定は座標系取り違えを検出して拒否。"
          preview:
              type: "boolean"
              required: false

