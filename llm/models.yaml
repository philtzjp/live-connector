tool_result_shapes:
    package_extension:
        command: "pnpm package"
        source: "apps/extension/package.ts"
        output_path: "apps/extension/dist/live-connector-1.0.0.ablx"
        archive_contents:
            - "manifest.json"
            - "dist/extension.js"
    render_audio:
        statuses:
            - status: "ok"
              fields:
                  filePath: "string"
                  startTime: "number"
                  endTime: "number"
                  duration: "number"
                  track: "{ index: number, name: string, kind: \"audio\" }"
    create_clip:
        statuses:
            - status: "preview"
              fields:
                  track: "{ index: number, name: string, kind: \"midi\" }"
                  clipSlot: "Record<string, unknown>"
                  length: "number"
            - status: "ok"
              fields:
                  track: "{ index: number, name: string, kind: \"midi\" }"
                  clipSlot: "Record<string, unknown>"
                  length: "number"
                  clip: "{ _label: \"MidiClip\", name: string, duration: number, startTime: number, endTime: number, noteCount: number }"
    create_arrangement_clip:
        statuses:
            - status: "preview"
              fields:
                  track: "{ index: number, name: string, kind: \"midi\" | \"audio\" }"
                  startTime: "number"
                  duration: "number"
                  audioFilePath: "string | undefined"
            - status: "ok"
              fields:
                  track: "{ index: number, name: string, kind: \"midi\" | \"audio\" }"
                  clip: "{ _label: \"MidiClip\" | \"AudioClip\" | \"Clip\", index: number | null, name: string, startTime: number, endTime: number, duration: number }"
    delete_arrangement_clip:
        statuses:
            - status: "preview"
              fields:
                  track: "{ index: number, name: string }"
                  clip: "{ _label: \"MidiClip\" | \"AudioClip\" | \"Clip\", index: number | null, name: string, startTime: number, endTime: number, duration: number }"
            - status: "ok"
              fields:
                  track: "{ index: number, name: string }"
                  clip: "{ _label: \"MidiClip\" | \"AudioClip\" | \"Clip\", index: number | null, name: string, startTime: number, endTime: number, duration: number }"
    create_cue_point:
        statuses:
            - status: "preview"
              fields:
                  time: "number"
                  name: "string | undefined"
            - status: "ok"
              fields:
                  cuePoint: "{ _label: \"CuePoint\", index: number | null, name: string, time: number }"
    delete_cue_point:
        statuses:
            - status: "preview"
              fields:
                  cuePoint: "{ _label: \"CuePoint\", index: number | null, name: string, time: number }"
            - status: "ok"
              fields:
                  cuePoint: "{ _label: \"CuePoint\", index: number | null, name: string, time: number }"
    set_tools:
        statuses:
            - status: "no_match"
              fields:
                  matched: "0"
            - status: "preview"
              fields:
                  matched: "number"
                  set: "Record<string, ScalarValue>"
                  targets: "Record<string, unknown>[]"
            - status: "confirm_required"
              fields:
                  matched: "number"
                  hint: "string"
            - status: "ok"
              fields:
                  modified: "number"
                  set: "Record<string, ScalarValue>"
        confirm_threshold: 20
    write_notes:
        statuses:
            - status: "preview"
              fields:
                  noteCount: "number"
            - status: "ok"
              fields:
                  noteCount: "number"

lom_graph:
    source: "packages/lom-schema/src/schema.ts"
    version: "1.0.0"
    startable_labels:
        source: "apps/extension/src/lom/adapter.ts"
        labels:
            - "Song"
            - "Track"
            - "MidiTrack"
            - "AudioTrack"
            - "ReturnTrack"
            - "MainTrack"
            - "Clip"
            - "MidiClip"
            - "AudioClip"
            - "Device"
            - "RackDevice"
            - "DrumRack"
            - "Simpler"
            - "Scene"
            - "CuePoint"
    labels:
        - label: "Song"
          description: "Live Set のルート。"
          properties:
              - { name: "tempo", type: "number", access: "rw" }
              - { name: "scaleMode", type: "boolean", access: "r" }
              - { name: "scaleName", type: "string", access: "r" }
              - { name: "rootNote", type: "number", access: "r", description: "0(C)-11(B)" }
              - { name: "scaleIntervals", type: "number[]", access: "r" }
              - { name: "gridQuantization", type: "enum", access: "r", enum: "grid_quantization" }
              - { name: "gridIsTriplet", type: "boolean", access: "r" }
        - label: "Track"
          abstract: true
          description: "MidiTrack / AudioTrack / ReturnTrack / MainTrack の抽象基底。"
          properties:
              - { name: "index", type: "number", access: "r" }
              - { name: "name", type: "string", access: "rw" }
              - { name: "kind", type: "string", access: "r", description: "midi/audio/return/main" }
              - { name: "arm", type: "boolean", access: "rw" }
              - { name: "mute", type: "boolean", access: "rw" }
              - { name: "solo", type: "boolean", access: "rw" }
              - { name: "mutedViaSolo", type: "boolean", access: "r" }
        - label: "MidiTrack"
          extends: "Track"
          properties: []
        - label: "AudioTrack"
          extends: "Track"
          properties: []
        - label: "ReturnTrack"
          extends: "Track"
          properties: []
        - label: "MainTrack"
          extends: "Track"
          properties: []
        - label: "Mixer"
          description: "トラックのミキサー。volume / panning / sends を Parameter として持つ。"
          properties: []
        - label: "Clip"
          abstract: true
          description: "MidiClip / AudioClip の抽象基底。"
          properties:
              - { name: "index", type: "number", access: "r" }
              - { name: "name", type: "string", access: "rw" }
              - { name: "color", type: "number", access: "rw" }
              - { name: "muted", type: "boolean", access: "rw" }
              - { name: "looping", type: "boolean", access: "rw" }
              - { name: "loopStart", type: "number", access: "r" }
              - { name: "loopEnd", type: "number", access: "r" }
              - { name: "startMarker", type: "number", access: "r" }
              - { name: "endMarker", type: "number", access: "r" }
              - { name: "startTime", type: "number", access: "r" }
              - { name: "endTime", type: "number", access: "r" }
              - { name: "duration", type: "number", access: "r" }
        - label: "MidiClip"
          extends: "Clip"
          properties: []
        - label: "AudioClip"
          extends: "Clip"
          properties:
              - { name: "filePath", type: "string", access: "r" }
              - { name: "warping", type: "boolean", access: "rw" }
              - { name: "warpMode", type: "enum", access: "rw", enum: "warp_mode" }
        - label: "ClipSlot"
          properties:
              - { name: "index", type: "number", access: "r" }
              - { name: "hasClip", type: "boolean", access: "r" }
        - label: "Scene"
          properties:
              - { name: "index", type: "number", access: "r" }
              - { name: "name", type: "string", access: "rw" }
              - { name: "tempo", type: "number", access: "r" }
              - { name: "signatureNumerator", type: "number", access: "r" }
              - { name: "signatureDenominator", type: "number", access: "r" }
        - label: "Device"
          abstract: true
          description: "RackDevice / DrumRack / Simpler を含む抽象基底。"
          properties:
              - { name: "index", type: "number", access: "r" }
              - { name: "name", type: "string", access: "r" }
        - label: "RackDevice"
          extends: "Device"
          properties: []
        - label: "DrumRack"
          extends: "Device"
          properties: []
        - label: "Simpler"
          extends: "Device"
          properties: []
        - label: "Parameter"
          description: "デバイス／ミキサーのパラメータ。"
          properties:
              - { name: "name", type: "string", access: "r" }
              - { name: "value", type: "number", access: "rw" }
              - { name: "min", type: "number", access: "r" }
              - { name: "max", type: "number", access: "r" }
              - { name: "defaultValue", type: "number", access: "r" }
              - { name: "isQuantized", type: "boolean", access: "r" }
              - { name: "valueItems", type: "string[]", access: "r" }
        - label: "Chain"
          properties:
              - { name: "index", type: "number", access: "r" }
        - label: "DrumChain"
          extends: "Chain"
          properties: []
        - label: "Note"
          description: "MidiClip 内の MIDI ノート。読みは query、書きは write_notes で扱う。"
          properties:
              - { name: "pitch", type: "number", access: "rw" }
              - { name: "startTime", type: "number", access: "rw" }
              - { name: "duration", type: "number", access: "rw" }
              - { name: "velocity", type: "number", access: "rw" }
              - { name: "muted", type: "boolean", access: "rw" }
              - { name: "probability", type: "number", access: "rw" }
              - { name: "releaseVelocity", type: "number", access: "rw" }
              - { name: "velocityDeviation", type: "number", access: "rw" }
              - { name: "selected", type: "boolean", access: "rw" }
        - label: "CuePoint"
          properties:
              - { name: "index", type: "number", access: "r" }
              - { name: "name", type: "string", access: "rw" }
              - { name: "time", type: "number", access: "r" }
        - label: "TakeLane"
          properties:
              - { name: "index", type: "number", access: "r" }
              - { name: "name", type: "string", access: "rw" }
    relationships:
        - { type: "HAS_TRACK", from: "Song", to: "Track", array: true }
        - { type: "HAS_RETURN", from: "Song", to: "ReturnTrack", array: true }
        - { type: "HAS_MAIN", from: "Song", to: "MainTrack", array: false }
        - { type: "HAS_SCENE", from: "Song", to: "Scene", array: true }
        - { type: "HAS_CUE", from: "Song", to: "CuePoint", array: true }
        - { type: "HAS_MIXER", from: "Track", to: "Mixer", array: false }
        - { type: "HAS_VOLUME", from: "Mixer", to: "Parameter", array: false }
        - { type: "HAS_PAN", from: "Mixer", to: "Parameter", array: false }
        - { type: "HAS_SEND", from: "Mixer", to: "Parameter", array: true }
        - { type: "HAS_DEVICE", from: "Track", to: "Device", array: true }
        - { type: "HAS_CLIPSLOT", from: "Track", to: "ClipSlot", array: true }
        - { type: "HAS_CLIP", from: "ClipSlot", to: "Clip", array: false }
        - { type: "HAS_ARRANGEMENT_CLIP", from: "Track", to: "Clip", array: true }
        - { type: "HAS_TAKELANE", from: "Track", to: "TakeLane", array: true }
        - { type: "HAS_PARAM", from: "Device", to: "Parameter", array: true }
        - { type: "HAS_CHAIN", from: "RackDevice", to: "Chain", array: true }
        - { type: "HAS_NOTE", from: "MidiClip", to: "Note", array: true }

cypher_contract:
    grammar_summary:
        query: "MATCH <pattern> [WHERE <expr>] RETURN <items> [LIMIT <integer>]"
        pattern: "(node)-[:REL|OTHER*min..max]->(node)"
        node: "(variable?:Label? { property: scalar, ... }?)"
    default_max_hops_when_omitted: 8
    start_labels:
        source: "packages/lom-schema/src/schema.ts#startable_labels"
        allowed:
            - "Song"
            - "Track"
            - "MidiTrack"
            - "AudioTrack"
            - "ReturnTrack"
            - "MainTrack"
            - "Clip"
            - "MidiClip"
            - "AudioClip"
            - "Device"
            - "RackDevice"
            - "DrumRack"
            - "Simpler"
            - "Scene"
            - "CuePoint"
        note: "Note / Parameter / ClipSlot などは起点にできない。起点ラベルから relationship で辿る。"
    read_return_contract:
        tool: "query"
        allowed:
            - "RETURN *"
            - "RETURN node_variable"
            - "RETURN node_variable.property"
            - "comma-separated combinations"
    write_select_return_contract:
        source: "packages/lom-schema/src/schema.ts#query_contract"
        tools:
            - "create_clip"
            - "create_arrangement_clip"
            - "delete_arrangement_clip"
            - "delete_cue_point"
            - "render_audio"
            - "set_track"
            - "set_clip"
            - "set_scene"
            - "set_cue_point"
            - "set_device_parameter"
            - "write_notes"
        required: "RETURN exactly one bound node variable"
        valid_examples:
            - "MATCH (t:AudioTrack {name:\"Print\"}) RETURN t"
            - "MATCH (t:MidiTrack {name:\"Drums\"})-[:HAS_CLIPSLOT]->(s:ClipSlot {index:0}) RETURN s"
            - "MATCH (t:Track {name:\"Print\"})-[:HAS_ARRANGEMENT_CLIP]->(c:Clip {index:0}) RETURN c"
            - "MATCH (t:Track {name:\"Drums\"}) RETURN t"
            - "MATCH (c:MidiClip {name:\"Bass\"}) RETURN c"
            - "MATCH (c:CuePoint {name:\"Verse\"}) RETURN c"
        invalid_examples:
            - "MATCH (t:Track) RETURN t.name"
            - "MATCH (t:Track)-[:HAS_CLIPSLOT]->(s:ClipSlot) RETURN t, s"

error_models:
    type_namespace: "urn:live-connector:error"
    type_policy: "RFC 9457 の type は外部 docs URL ではなく、安定した不透明 URI として扱う。"
    response_policy:
        http: "HTTP サーバー層は RFC 9457 ProblemDetails を返す。"
        mcp: "MCP ツール失敗時は McpError を返し、HTTP の status/type/instance は含めない。"
    classes:
        - name: "AppError"
          status_source: "constructor args"
          type_source: "constructor args or about:blank"
        - name: "ConfigError"
          status: 500
          type: "urn:live-connector:error:config"
        - name: "AuthError"
          status: 401
          type: "urn:live-connector:error:unauthorized"
        - name: "BadRequestError"
          status: 400
          type: "urn:live-connector:error:bad-request"
        - name: "NotFoundError"
          status: 404
          type: "urn:live-connector:error:not-found"
        - name: "MethodNotAllowedError"
          status: 405
          type: "urn:live-connector:error:method-not-allowed"
    normalization:
        http:
            function: "toProblemDetails"
            app_error: "AppError.toProblemDetails(instance)"
            unknown_error:
                type: "about:blank"
                title: "Internal Server Error"
                status: 500
        mcp:
            function: "toMcpError"
            app_error:
                error: "ConfigError=config / AuthError=unauthorized / BadRequestError=bad_request / NotFoundError=not_found / MethodNotAllowedError=method_not_allowed"
                detail: "AppError.detail or AppError.title"
                metadata: "hint / validProperties / validRelationships / validStartLabels when present"
            unknown_error:
                error: "internal_error"
                detail: "Error.message or String(error)"

examples:
    cypher:
        source: "packages/lom-schema/src/schema.ts"
        values:
            - "MATCH (t:Track) RETURN t.index, t.name, t.kind, t.mute, t.arm"
            - "MATCH (:Track {name:\"Drums\"})-[:HAS_DEVICE]->(:Device {name:\"Operator\"})-[:HAS_PARAM]->(p:Parameter {name:\"Cutoff\"}) RETURN p.value, p.min, p.max"
            - "MATCH (t:MidiTrack {mute:true})-[:HAS_CLIPSLOT]->(:ClipSlot)-[:HAS_CLIP]->(c:Clip) RETURN t.name, c.index, c.name"
            - "MATCH (c:MidiClip {index:0})-[:HAS_NOTE]->(n:Note) WHERE n.pitch >= 60 RETURN n"
