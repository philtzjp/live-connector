schema_version: "1.0"
description: "live-connector の TypeScript 型、MCP ツール入出力、LOM グラフモデルの目録。実装変更時に更新する。"

source_files:
    build_scripts:
        - "package.json"
        - "turbo.json"
        - "apps/extension/package.json"
        - "apps/extension/build.ts"
        - "apps/extension/package.ts"
        - "apps/extension/src/types/manifest.ts"
    runtime:
        - "apps/extension/src/extension.ts"
        - "apps/extension/src/deps.ts"
        - "apps/extension/src/server/http.ts"
        - "apps/extension/src/server/mcp.ts"
    tools:
        - "apps/extension/src/tools/schema.ts"
        - "apps/extension/src/tools/overview.ts"
        - "apps/extension/src/tools/query.ts"
        - "apps/extension/src/tools/audio.ts"
        - "apps/extension/src/tools/arrangement.ts"
        - "apps/extension/src/tools/create.ts"
        - "apps/extension/src/tools/write.ts"
        - "apps/extension/src/tools/notes.ts"
    lom_adapter:
        - "apps/extension/src/lom/adapter.ts"
    packages:
        - "packages/cypher/src/ast.ts"
        - "packages/cypher/src/evaluator.ts"
        - "packages/cypher/src/parser.ts"
        - "packages/cypher/src/tokenizer.ts"
        - "packages/lom-schema/src/types.ts"
        - "packages/lom-schema/src/schema.ts"
        - "packages/env/src/index.ts"
        - "packages/error/src/index.ts"
        - "packages/log/src/index.ts"

enums:
    property_type:
        source: "packages/lom-schema/src/types.ts"
        values:
            - "number"
            - "string"
            - "boolean"
            - "number[]"
            - "string[]"
            - "enum"
    property_access:
        source: "packages/lom-schema/src/types.ts"
        values:
            - "r"
            - "rw"
    comparison_operator:
        source: "packages/cypher/src/ast.ts"
        values:
            - "="
            - "<>"
            - "<"
            - ">"
            - "<="
            - ">="
            - "CONTAINS"
            - "STARTS_WITH"
            - "IN"
    token_type:
        source: "packages/cypher/src/tokenizer.ts"
        values:
            - "keyword"
            - "identifier"
            - "number"
            - "string"
            - "boolean"
            - "null"
            - "punct"
    log_level:
        source: "packages/log/src/index.ts"
        values:
            - "debug"
            - "info"
            - "warn"
            - "error"
    warp_mode:
        source: "packages/lom-schema/src/schema.ts"
        values:
            - "Beats"
            - "Tones"
            - "Texture"
            - "Repitch"
            - "Complex"
            - "ComplexPro"
    grid_quantization:
        source: "packages/lom-schema/src/schema.ts"
        values:
            - "NoGrid"
            - "EightBars"
            - "FourBars"
            - "TwoBars"
            - "Bar"
            - "Half"
            - "Quarter"
            - "Eighth"
            - "Sixteenth"
            - "ThirtySecond"

models:
    - name: "ExtensionManifest"
      kind: "manifest"
      source: "apps/extension/src/types/manifest.ts"
      owner_package: "@live-connector/extension"
      fields:
          - name: "name"
            type: "string"
            required: true
          - name: "author"
            type: "string"
            required: true
          - name: "version"
            type: "string"
            required: true
          - name: "entry"
            type: "string"
            required: true
          - name: "minimumApiVersion"
            type: "string"
            required: true

    - name: "Env"
      kind: "configuration"
      source: "packages/env/src/index.ts"
      owner_package: "@live-connector/env"
      fields:
          - name: "LIVE_CONNECTOR_MCP_HOST"
            type: "string"
            required: false
            default: "127.0.0.1"
          - name: "LIVE_CONNECTOR_MCP_PORT"
            type: "number"
            required: false
            default: 7799
          - name: "LIVE_CONNECTOR_MCP_TOKEN"
            type: "string"
            required: false
            default: null
            note: "設定されている場合のみ /api/v1/mcp に Bearer 認証を適用する。"

    - name: "ServerDeps"
      kind: "dependency_container"
      source: "apps/extension/src/deps.ts"
      owner_package: "@live-connector/extension"
      fields:
          - name: "context"
            type: "ExtensionContext<\"1.0.0\">"
            required: true
          - name: "log"
            type: "Logger"
            required: true

    - name: "ServerInfo"
      kind: "runtime_output"
      source: "apps/extension/src/server/http.ts"
      fields:
          - name: "host"
            type: "string"
            required: true
          - name: "port"
            type: "number"
            required: true
          - name: "mcpPath"
            type: "string"
            required: true
            value: "/api/v1/mcp"

    - name: "HealthResponse"
      kind: "http_response"
      source: "apps/extension/src/server/http.ts"
      content_type: "application/health+json"
      fields:
          - name: "status"
            type: "string"
            required: true
            value: "pass"
          - name: "version"
            type: "string"
            required: true
            value: "0.0.0"
          - name: "description"
            type: "string"
            required: true
            value: "live-connector MCP server"

    - name: "HttpEndpoint"
      kind: "http_contract"
      source: "apps/extension/src/server/http.ts"
      entries:
          - method: "GET"
            path: "/health"
            auth: "none"
            response: "HealthResponse"
          - method: "POST"
            path: "/api/v1/mcp"
            auth: "Bearer when LIVE_CONNECTOR_MCP_TOKEN is set"
            transport: "StreamableHTTPServerTransport"

    - name: "TextContent"
      kind: "mcp_content"
      source: "apps/extension/src/tools/write.ts"
      fields:
          - name: "type"
            type: "\"text\""
            required: true
          - name: "text"
            type: "string"
            required: true

    - name: "ToolResult"
      kind: "mcp_result"
      source: "apps/extension/src/tools/write.ts"
      fields:
          - name: "content"
            type: "TextContent[]"
            required: true
          - name: "isError"
            type: "boolean"
            required: false

    - name: "ProblemDetails"
      kind: "error_response"
      source: "packages/error/src/index.ts"
      owner_package: "@live-connector/error"
      standard: "RFC 9457"
      fields:
          - name: "type"
            type: "string"
            required: true
          - name: "title"
            type: "string"
            required: true
          - name: "status"
            type: "number"
            required: true
          - name: "detail"
            type: "string"
            required: false
          - name: "instance"
            type: "string"
            required: false

    - name: "McpErrorMetadata"
      kind: "mcp_error_metadata"
      source: "packages/error/src/index.ts"
      owner_package: "@live-connector/error"
      fields:
          - name: "hint"
            type: "string"
            required: false
          - name: "validProperties"
            type: "string[]"
            required: false
          - name: "validRelationships"
            type: "string[]"
            required: false
          - name: "validStartLabels"
            type: "string[]"
            required: false

    - name: "McpError"
      kind: "mcp_error_response"
      source: "packages/error/src/index.ts"
      owner_package: "@live-connector/error"
      fields:
          - name: "error"
            type: "string"
            required: true
          - name: "detail"
            type: "string"
            required: true
          - name: "hint"
            type: "string"
            required: false
          - name: "validProperties"
            type: "string[]"
            required: false
          - name: "validRelationships"
            type: "string[]"
            required: false
          - name: "validStartLabels"
            type: "string[]"
            required: false

    - name: "AppErrorArgs"
      kind: "error_input"
      source: "packages/error/src/index.ts"
      fields:
          - name: "type"
            type: "string"
            required: false
          - name: "title"
            type: "string"
            required: true
          - name: "status"
            type: "number"
            required: true
          - name: "detail"
            type: "string"
            required: false
          - name: "metadata"
            type: "McpErrorMetadata"
            required: false

    - name: "Logger"
      kind: "service_interface"
      source: "packages/log/src/index.ts"
      owner_package: "@live-connector/log"
      methods:
          - name: "debug"
            params: ["message: string", "fields?: LogFields"]
          - name: "info"
            params: ["message: string", "fields?: LogFields"]
          - name: "warn"
            params: ["message: string", "fields?: LogFields"]
          - name: "error"
            params: ["message: string", "fields?: LogFields"]

    - name: "LogFields"
      kind: "record"
      source: "packages/log/src/index.ts"
      type: "Record<string, unknown>"

    - name: "ScalarValue"
      kind: "cypher_value"
      source: "packages/cypher/src/ast.ts"
      type: "string | number | boolean | null"

    - name: "Token"
      kind: "cypher_token"
      source: "packages/cypher/src/tokenizer.ts"
      fields:
          - name: "type"
            type: "TokenType"
            required: true
          - name: "value"
            type: "string"
            required: true
          - name: "start"
            type: "number"
            required: true

    - name: "NodePattern"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "variable"
            type: "string | null"
            required: true
          - name: "label"
            type: "string | null"
            required: true
          - name: "properties"
            type: "Record<string, ScalarValue>"
            required: true

    - name: "RelationshipPattern"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "types"
            type: "string[]"
            required: true
          - name: "minHops"
            type: "number"
            required: true
            default: 1
          - name: "maxHops"
            type: "number"
            required: true
            default: 1

    - name: "PatternPart"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "start"
            type: "NodePattern"
            required: true
          - name: "chain"
            type: "{ relationship: RelationshipPattern; node: NodePattern }[]"
            required: true

    - name: "PropertyRef"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "variable"
            type: "string"
            required: true
          - name: "property"
            type: "string"
            required: true

    - name: "ComparisonExpr"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "kind"
            type: "\"comparison\""
            required: true
          - name: "left"
            type: "PropertyRef"
            required: true
          - name: "operator"
            type: "ComparisonOperator"
            required: true
          - name: "right"
            type: "ScalarValue | ScalarValue[]"
            required: true

    - name: "LogicalExpr"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "kind"
            type: "\"logical\""
            required: true
          - name: "operator"
            type: "\"AND\" | \"OR\""
            required: true
          - name: "left"
            type: "WhereExpr"
            required: true
          - name: "right"
            type: "WhereExpr"
            required: true

    - name: "NotExpr"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "kind"
            type: "\"not\""
            required: true
          - name: "expr"
            type: "WhereExpr"
            required: true

    - name: "WhereExpr"
      kind: "cypher_ast_union"
      source: "packages/cypher/src/ast.ts"
      variants:
          - "ComparisonExpr"
          - "LogicalExpr"
          - "NotExpr"

    - name: "ReturnItem"
      kind: "cypher_ast_union"
      source: "packages/cypher/src/ast.ts"
      variants:
          - "{ kind: \"all\" }"
          - "{ kind: \"variable\"; variable: string }"
          - "{ kind: \"property\"; variable: string; property: string }"

    - name: "Query"
      kind: "cypher_ast"
      source: "packages/cypher/src/ast.ts"
      fields:
          - name: "pattern"
            type: "PatternPart"
            required: true
          - name: "where"
            type: "WhereExpr | null"
            required: true
          - name: "returns"
            type: "ReturnItem[]"
            required: true
          - name: "limit"
            type: "number | null"
            required: true

    - name: "Row"
      kind: "query_result"
      source: "packages/cypher/src/evaluator.ts"
      type: "Record<string, unknown>"

    - name: "GraphAdapter"
      kind: "service_interface"
      source: "packages/cypher/src/evaluator.ts"
      methods:
          - name: "seeds"
            params: ["label: string | null"]
            returns: "Promise<N[]>"
          - name: "expand"
            params: ["node: N", "relationshipTypes: string[]"]
            returns: "Promise<N[]>"
          - name: "labelOf"
            params: ["node: N"]
            returns: "string"
          - name: "matchesLabel"
            params: ["node: N", "label: string"]
            returns: "boolean"
          - name: "getProperty"
            params: ["node: N", "property: string"]
            returns: "Promise<ScalarValue>"
          - name: "serialize"
            params: ["node: N"]
            returns: "Promise<Record<string, unknown>>"
          - name: "identity"
            params: ["node: N"]
            returns: "unknown"

    - name: "PropertyDef"
      kind: "lom_schema_type"
      source: "packages/lom-schema/src/types.ts"
      fields:
          - name: "name"
            type: "string"
            required: true
          - name: "type"
            type: "PropertyType"
            required: true
          - name: "access"
            type: "PropertyAccess"
            required: true
          - name: "enumValues"
            type: "string[]"
            required: false
          - name: "description"
            type: "string"
            required: false

    - name: "NodeLabelDef"
      kind: "lom_schema_type"
      source: "packages/lom-schema/src/types.ts"
      fields:
          - name: "label"
            type: "string"
            required: true
          - name: "extends"
            type: "string"
            required: false
          - name: "abstract"
            type: "boolean"
            required: false
          - name: "properties"
            type: "PropertyDef[]"
            required: true
          - name: "description"
            type: "string"
            required: false

    - name: "RelationshipDef"
      kind: "lom_schema_type"
      source: "packages/lom-schema/src/types.ts"
      fields:
          - name: "type"
            type: "string"
            required: true
          - name: "from"
            type: "string"
            required: true
          - name: "to"
            type: "string"
            required: true
          - name: "array"
            type: "boolean"
            required: true
          - name: "description"
            type: "string"
            required: false

    - name: "QueryContract"
      kind: "lom_schema_type"
      source: "packages/lom-schema/src/types.ts"
      fields:
          - name: "grammar"
            type: "string"
            required: true
          - name: "start_labels"
            type: "string[]"
            required: true
          - name: "read"
            type: "{ tool: string; return_contract: string; allowed_returns: string[] }"
            required: true
          - name: "select"
            type: "{ tools: string[]; return_contract: string; valid_examples: string[]; invalid_examples: string[]; hint: string }"
            required: true

    - name: "LomSchema"
      kind: "lom_schema_type"
      source: "packages/lom-schema/src/types.ts"
      fields:
          - name: "version"
            type: "string"
            required: true
          - name: "nodes"
            type: "NodeLabelDef[]"
            required: true
          - name: "relationships"
            type: "RelationshipDef[]"
            required: true

    - name: "ObjectNode"
      kind: "adapter_internal_model"
      source: "apps/extension/src/lom/adapter.ts"
      fields:
          - name: "type"
            type: "\"object\""
            required: true
          - name: "label"
            type: "string"
            required: true
          - name: "value"
            type: "DataModelObject<\"1.0.0\">"
            required: true
          - name: "index"
            type: "number | null"
            required: true

    - name: "NoteNode"
      kind: "adapter_internal_model"
      source: "apps/extension/src/lom/adapter.ts"
      fields:
          - name: "type"
            type: "\"note\""
            required: true
          - name: "label"
            type: "\"Note\""
            required: true
          - name: "value"
            type: "NoteDescription"
            required: true
          - name: "index"
            type: "number"
            required: true

    - name: "LomNode"
      kind: "adapter_internal_union"
      source: "apps/extension/src/lom/adapter.ts"
      variants:
          - "ObjectNode"
          - "NoteNode"

mcp_tools:
    - name: "schema"
      source: "apps/extension/src/tools/schema.ts"
      input: null
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  schema: "LomSchema"
                  query_contract: "QueryContract"
                  examples: "string[]"

    - name: "get_overview"
      source: "apps/extension/src/tools/overview.ts"
      input: null
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  tempo: "number"
                  scale:
                      name: "string"
                      mode: "boolean"
                      rootNote: "number"
                  trackCount: "number"
                  returnTrackCount: "number"
                  sceneCount: "number"
                  cuePointCount: "number"
                  arrangementEndTime: "number"
                  cuePoints:
                      type: "array"
                      item:
                          index: "number"
                          name: "string"
                          time: "number"
                  tracks:
                      type: "array"
                      item:
                          index: "number"
                          name: "string"
                          kind: "midi | audio | other"
                          mute: "boolean"
                          solo: "boolean"
                          arm: "boolean"
                          arrangementClipCount: "number"
                          arrangementClips:
                              type: "array"
                              item:
                                  index: "number"
                                  _label: "\"MidiClip\" | \"AudioClip\" | \"Clip\""
                                  name: "string"
                                  startTime: "number"
                                  endTime: "number"
                                  duration: "number"

    - name: "query"
      source: "apps/extension/src/tools/query.ts"
      input:
          cypher:
              type: "string"
              required: true
              min_length: 1
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  count: "number"
                  rows: "Row[]"

    - name: "render_audio"
      source: "apps/extension/src/tools/audio.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "AudioTrack を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          startTime:
              type: "number"
              required: true
              constraints: ["value >= 0"]
          endTime:
              type: "number"
              required: true
              constraints: ["positive", "endTime > startTime"]
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"ok\""
                  filePath: "string"
                  startTime: "number"
                  endTime: "number"
                  duration: "number"
                  track:
                      index: "number"
                      name: "string"
                      kind: "\"audio\""

    - name: "create_arrangement_clip"
      source: "apps/extension/src/tools/arrangement.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "MidiTrack または AudioTrack を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          startTime:
              type: "number"
              required: true
              constraints: ["value >= 0"]
          duration:
              type: "number"
              required: true
              constraints: ["positive"]
          name:
              type: "string"
              required: false
          audioFilePath:
              type: "string"
              required: false
              note: "AudioTrack を選択した場合は必須。"
          isWarped:
              type: "boolean"
              required: false
          loopSettings:
              type: "ClipLoopSettings"
              required: false
          preview:
              type: "boolean"
              required: false
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"preview\" | \"ok\""
                  track:
                      index: "number"
                      name: "string"
                      kind: "\"midi\" | \"audio\""
                  startTime:
                      optional: true
                      type: "number"
                  duration:
                      optional: true
                      type: "number"
                  audioFilePath:
                      optional: true
                      type: "string"
                  clip:
                      optional: true
                      shape:
                          _label: "\"MidiClip\" | \"AudioClip\" | \"Clip\""
                          index: "number | null"
                          name: "string"
                          startTime: "number"
                          endTime: "number"
                          duration: "number"

    - name: "delete_arrangement_clip"
      source: "apps/extension/src/tools/arrangement.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "アレンジメント Clip を単一ノード変数で RETURN する Cypher。Session Clip は不可。"
          preview:
              type: "boolean"
              required: false
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"preview\" | \"ok\""
                  track:
                      index: "number"
                      name: "string"
                  clip:
                      _label: "\"MidiClip\" | \"AudioClip\" | \"Clip\""
                      index: "number | null"
                      name: "string"
                      startTime: "number"
                      endTime: "number"
                      duration: "number"

    - name: "create_cue_point"
      source: "apps/extension/src/tools/arrangement.ts"
      input:
          time:
              type: "number"
              required: true
              constraints: ["value >= 0"]
          name:
              type: "string"
              required: false
          preview:
              type: "boolean"
              required: false
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"preview\" | \"ok\""
                  time:
                      optional: true
                      type: "number"
                  name:
                      optional: true
                      type: "string"
                  cuePoint:
                      optional: true
                      shape:
                          _label: "\"CuePoint\""
                          index: "number | null"
                          name: "string"
                          time: "number"

    - name: "delete_cue_point"
      source: "apps/extension/src/tools/arrangement.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "CuePoint を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          preview:
              type: "boolean"
              required: false
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"preview\" | \"ok\""
                  cuePoint:
                      _label: "\"CuePoint\""
                      index: "number | null"
                      name: "string"
                      time: "number"

    - name: "create_clip"
      source: "apps/extension/src/tools/create.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "空の ClipSlot を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          length:
              type: "number"
              required: true
              constraints: ["positive"]
          preview:
              type: "boolean"
              required: false
      output:
          content:
              type: "TextContent[]"
              text_json_shape:
                  status: "\"preview\" | \"ok\""
                  track:
                      index: "number"
                      name: "string"
                      kind: "\"midi\""
                  clipSlot: "Record<string, unknown>"
                  length: "number"
                  clip:
                      optional: true
                      shape:
                          _label: "\"MidiClip\""
                          name: "string"
                          duration: "number"
                          startTime: "number"
                          endTime: "number"
                          noteCount: "number"

    - name: "set_song"
      source: "apps/extension/src/tools/write.ts"
      input:
          set:
              tempo:
                  type: "number"
                  required: false
                  constraints: ["positive"]
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false
      selection:
          fixed_select: "MATCH (s:Song) RETURN s"

    - name: "set_track"
      source: "apps/extension/src/tools/write.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "Track を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          set:
              name:
                  type: "string"
                  required: false
              arm:
                  type: "boolean"
                  required: false
              mute:
                  type: "boolean"
                  required: false
              solo:
                  type: "boolean"
                  required: false
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false

    - name: "set_clip"
      source: "apps/extension/src/tools/write.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "Clip を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          set:
              name:
                  type: "string"
                  required: false
              color:
                  type: "number"
                  required: false
              muted:
                  type: "boolean"
                  required: false
              looping:
                  type: "boolean"
                  required: false
              warping:
                  type: "boolean"
                  required: false
              warpMode:
                  type: "warp_mode"
                  required: false
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false

    - name: "set_scene"
      source: "apps/extension/src/tools/write.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "Scene を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          set:
              name:
                  type: "string"
                  required: false
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false

    - name: "set_cue_point"
      source: "apps/extension/src/tools/write.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "CuePoint を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          set:
              name:
                  type: "string"
                  required: false
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false

    - name: "set_device_parameter"
      source: "apps/extension/src/tools/write.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "Parameter を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          set:
              value:
                  type: "number"
                  required: true
          preview:
              type: "boolean"
              required: false
          confirm:
              type: "boolean"
              required: false

    - name: "write_notes"
      source: "apps/extension/src/tools/notes.ts"
      input:
          select:
              type: "string"
              required: true
              contract: "MidiClip を単一ノード変数で RETURN する Cypher。プロパティ射影・複数変数は不可。"
          notes:
              type: "NoteInput[]"
              required: true
          mode:
              type: "\"replace\""
              required: false
              default: "replace"
          preview:
              type: "boolean"
              required: false

tool_support_models:
