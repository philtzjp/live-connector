              note: "Audio の内容窓終了（拍）。MIDI ではノートの窓終了として解釈する。"
          overwrite:
              type: "boolean"
              required: false
              note: "新しい範囲が他クリップと重なる場合に true で範囲を空ける。"
          confirm:
              type: "boolean"
              required: false
              note: "再現不能属性の喪失・窓外ノート削除・他クリップ消去を伴う場合に必須。"
          preview:
              type: "boolean"
              required: false
      output:
          content:
